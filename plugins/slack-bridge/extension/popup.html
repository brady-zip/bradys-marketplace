<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font: 13px -apple-system, sans-serif; width: 460px; margin: 0; padding: 14px; }
    h1 { font-size: 14px; margin: 0 0 4px; }
    .sub { color: #666; margin: 0 0 12px; font-size: 12px; }
    .row { margin-bottom: 12px; }
    label { font-weight: 600; display: block; margin-bottom: 4px; }
    textarea { width: 100%; box-sizing: border-box; height: 46px; font-family: monospace;
               font-size: 11px; resize: vertical; }
    button { font-size: 12px; padding: 4px 10px; cursor: pointer; margin-top: 4px; }
    .status { font-size: 11px; color: #888; margin-top: 6px; min-height: 14px; }
    .err { color: #c00; }
    pre { background: #f4f4f4; padding: 8px; font-size: 11px; overflow-x: auto;
          white-space: pre-wrap; word-break: break-all; }
    .envblock { margin-top: 10px; }
  </style>
</head>
<body>
  <h1>Slack Bridge Token Grabber</h1>
  <p class="sub">Open a logged-in Slack tab first, then click Grab. Local use only — nothing is sent anywhere.</p>

  <button id="grab">Grab tokens from current Slack tab</button>
  <div id="status" class="status"></div>

  <div class="row">
    <label>xoxc (workspace token)</label>
    <textarea id="xoxc" readonly placeholder="not grabbed yet"></textarea>
    <button class="copy" data-target="xoxc">Copy</button>
  </div>

  <div class="row">
    <label>xoxd (d cookie)</label>
    <textarea id="xoxd" readonly placeholder="not grabbed yet"></textarea>
    <button class="copy" data-target="xoxd">Copy</button>
  </div>

  <div class="envblock">
    <label>Ready-to-paste env file line</label>
    <pre id="envline">run grab first…</pre>
    <button id="copyenv">Copy env line</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
